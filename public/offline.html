<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RunnerSheet Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0d0d0f;
        color: #fafafa;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      main {
        width: min(90vw, 32rem);
        border: 1px solid #2c2c31;
        border-radius: 16px;
        padding: 1.25rem 1.1rem;
        background: #161618;
      }
      h1 {
        margin: 0 0 0.55rem;
        font-size: 1.15rem;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RunnerSheet is offline</h1>
      <p>
        You can keep using cached screens. New writes (like starting a journey)
        will sync automatically once signal returns.
      </p>
    </main>
  </body>
</html>
