<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="RunnerSheet">
  <defs>
    <linearGradient id="rs-rim" x1="96" y1="256" x2="280" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f4f5"/>
      <stop offset="1" stop-color="#d4d4d8"/>
    </linearGradient>
  </defs>
  <!-- App chrome (#0d0d0f); matches sharp raster background -->
  <rect width="512" height="512" rx="108" fill="#0d0d0f"/>
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>
  <!-- Left arc: steering-wheel rim (reads at 32px; not a menu stack) -->
  <path
    d="M 112 348 A 168 168 0 0 1 112 164"
    fill="none"
    stroke="url(#rs-rim)"
    stroke-width="56"
    stroke-linecap="round"
  />
  <!-- Arnold Clark–style yellow tick -->
  <path
    d="M 196 262 L 256 338 L 404 174"
    fill="none"
    stroke="#ffd500"
    stroke-width="48"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
